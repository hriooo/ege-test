// Индексы письменных вопросов
const TEXT_QS = Q.reduce((acc,q,i)=>{ if(q.type==="t") acc.push(i); return acc; },[]);

function pct(c,t){return t?Math.round(c/t*100):0;}
const C={bg:"#07111d",card:"#0c1929",border:"#17304a",text:"#dde6f0",sub:"#5e7d9a",gold:"#ddb84e"};

async function sendToTelegram(text){
  try{
    await fetch(`https://api.telegram.org/bot${TG_TOKEN}/sendMessage`,{
      method:"POST",headers:{"Content-Type":"application/json"},
      body:JSON.stringify({chat_id:TG_CHAT,text,parse_mode:"HTML"})
    });
  }catch(e){console.error("TG error",e);}
}

function saveProgress(state){try{localStorage.setItem(SAVE_KEY,JSON.stringify(state));}catch(e){}}
function loadProgress(){try{const s=localStorage.getItem(SAVE_KEY);return s?JSON.parse(s):null;}catch(e){return null;}}
function clearProgress(){try{localStorage.removeItem(SAVE_KEY);}catch(e){}}

function EGETest(){
  const saved=loadProgress();
  const [screen,setScreen]=useState(saved?"resume":"name");
  const [studentName,setStudentName]=useState(saved?.studentName||"");
  const [idx,setIdx]=useState(saved?.idx||0);
  const [answers,setAnswers]=useState(saved?.answers||{});
  const [multiSel,setMultiSel]=useState([]);
  const [textVal,setTextVal]=useState("");
  const [showHint,setShowHint]=useState(false);
  const [selfMark,setSelfMark]=useState(saved?.selfMark||{});
  // Хранение текстовых ответов
  const [textAnswers,setTextAnswers]=useState(saved?.textAnswers||{});
  const [sending,setSending]=useState(false);
  const [sent,setSent]=useState(false);

  const q=Q[idx];

  useEffect(()=>{
    if(screen==="quiz"||screen==="results"){
      saveProgress({studentName,idx,answers,selfMark,textAnswers});
    }
  },[screen,idx,answers,selfMark,textAnswers]);

  const handleNext=()=>{
    if(q.type==="m") setAnswers(p=>({...p,[idx]:[...multiSel].sort((a,b)=>a-b)}));
    // Сохраняем текстовый ответ перед переходом
    if(q.type==="t" && textVal.trim()){
      setTextAnswers(p=>({...p,[idx]:textVal.trim()}));
    }
    if(idx<Q.length-1){setIdx(p=>p+1);setMultiSel([]);setTextVal("");setShowHint(false);}
    else setScreen("results");
  };

  const canNext=()=>{
    if(!q) return false;
    if(q.type==="s") return answers[idx]!==undefined;
    if(q.type==="m") return multiSel.length>0;
    if(q.type==="t") return selfMark[idx]!==undefined;
    return false;
  };

  const computeResults=()=>{
    const ts={};Object.keys(TOPICS).forEach(k=>ts[k]={total:0,correct:0});
    let total=0,correct=0;
    Q.forEach((question,i)=>{
      ts[question.tk].total++;total++;
      if(question.type==="s"){if(answers[i]===question.ans){correct++;ts[question.tk].correct++;}}
      else if(question.type==="m"){
        const a=answers[i]||[];
        if(JSON.stringify(a)===JSON.stringify([...question.ans].sort((x,y)=>x-y))){correct++;ts[question.tk].correct++;}
      }
      else if(question.type==="t"){if(selfMark[i]){correct++;ts[question.tk].correct++;}}
    });
    return{total,correct,ts};
  };

  const handleSendTelegram=async(res)=>{
    setSending(true);
    const{total,correct,ts}=res;
    const ov=pct(correct,total);
    const weak=Object.entries(ts).filter(([,v])=>pct(v.correct,v.total)<60);

    // Сообщение 1: общие результаты
    const msg1=[
      `📋 <b>Результаты диагностического теста ЕГЭ</b>`,
      `👤 Ученик: <b>${studentName}</b>`,``,
      `📊 Общий результат: <b>${correct}/${total} (${ov}%)</b>`,``,
      `<b>По разделам кодификатора:</b>`,
      ...Object.entries(TOPICS).map(([k,v])=>{
        const s=ts[k];const p=pct(s.correct,s.total);
        const bar=p>=80?"🟢":p>=60?"🟡":p>=40?"🟠":"🔴";
        return`${bar} ${v.emoji} ${v.label}: ${s.correct}/${s.total} (${p}%)`;
      }),``,
      weak.length>0
        ?`⚠️ <b>Слабые темы (менее 60%):</b>\n${weak.map(([k])=>`• ${TOPICS[k].emoji} ${TOPICS[k].label}`).join('\n')}`
        :`✅ Все темы — 60% и выше!`,
    ].join('\n');
    await sendToTelegram(msg1);

    // Сообщение 2: письменные ответы
    const writtenLines=[`✍️ <b>Письменные ответы — ${studentName}</b>`,``];
    TEXT_QS.forEach(i=>{
      const question=Q[i];
      const mark=selfMark[i];
      const userText=textAnswers[i]||"(ответ не введён)";
      const markLabel=mark===true?"✅ сам отметил верно":mark===false?"❌ сам отметил неверно":"— не оценено";
      writtenLines.push(`<b>Вопрос ${i+1}:</b> ${question.q}`);
      writtenLines.push(`<b>Ответ ученика:</b> ${userText}`);
      writtenLines.push(`<b>Самооценка:</b> ${markLabel}`);
      writtenLines.push(``);
    });
    await sendToTelegram(writtenLines.join('\n'));

    setSending(false);setSent(true);clearProgress();
  };

  const reset=()=>{
    clearProgress();
    setScreen("name");setStudentName("");setIdx(0);setAnswers({});
    setMultiSel([]);setTextVal("");setShowHint(false);setSelfMark({});
    setTextAnswers({});setSending(false);setSent(false);
  };

  /* RESUME */
  if(screen==="resume") return(
    <div style={{minHeight:"100vh",background:C.bg,display:"flex",alignItems:"center",justifyContent:"center",padding:"28px 20px"}}>
      <div style={{maxWidth:440,width:"100%",textAlign:"center"}}>
        <div style={{fontSize:48,marginBottom:16}}>💾</div>
        <h1 style={{fontFamily:"'Crimson Pro',serif",fontSize:28,fontWeight:600,color:C.gold,margin:"0 0 10px"}}>Найден сохранённый прогресс</h1>
        <div style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:14,padding:20,margin:"20px 0 24px",textAlign:"left"}}>
          <div style={{fontSize:13,color:C.sub,marginBottom:5}}>Ученик</div>
          <div style={{fontSize:17,fontWeight:700,color:C.text,marginBottom:14}}>{saved?.studentName}</div>
          <div style={{fontSize:13,color:C.sub,marginBottom:5}}>Остановился на вопросе</div>
          <div style={{fontSize:17,fontWeight:700,color:C.gold}}>{(saved?.idx||0)+1} из {Q.length}</div>
          <div style={{background:C.border,borderRadius:4,height:6,marginTop:10,overflow:"hidden"}}>
            <div style={{height:"100%",width:`${((saved?.idx||0)/Q.length)*100}%`,background:C.gold,borderRadius:4}}/>
          </div>
        </div>
        <button onClick={()=>setScreen("quiz")}
          style={{width:"100%",background:C.gold,color:"#07111d",border:"none",borderRadius:12,padding:"14px 0",fontSize:15,fontWeight:700,cursor:"pointer",marginBottom:10}}>
          ▶ Продолжить с вопроса {(saved?.idx||0)+1}
        </button>
        <button onClick={reset}
          style={{width:"100%",background:"transparent",border:`1px solid ${C.border}`,borderRadius:12,padding:"13px 0",fontSize:14,fontWeight:600,color:C.sub,cursor:"pointer"}}>
          Начать заново
        </button>
      </div>
    </div>
  );

  /* NAME */
  if(screen==="name") return(
    <div style={{minHeight:"100vh",background:C.bg,display:"flex",alignItems:"center",justifyContent:"center",padding:"28px 20px"}}>
      <div style={{maxWidth:480,width:"100%",textAlign:"center"}}>
        <div style={{fontSize:54,marginBottom:16}}>📋</div>
        <h1 style={{fontFamily:"'Crimson Pro',serif",fontSize:"clamp(22px,5vw,34px)",fontWeight:600,color:C.gold,margin:"0 0 10px",lineHeight:1.2}}>
          Диагностический тест<br/>ЕГЭ · Обществознание
        </h1>
        <p style={{fontSize:14,color:C.sub,margin:"0 0 10px",lineHeight:1.7}}>
          95 вопросов · 5 разделов кодификатора · ~70 минут<br/>
          <span style={{color:"#34d399",fontSize:13}}>✓ Прогресс сохраняется автоматически</span>
        </p>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:22,textAlign:"left"}}>
          {Object.entries(TOPICS).map(([k,v])=>(
            <div key={k} style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:10,padding:"10px 12px",display:"flex",alignItems:"flex-start",gap:8}}>
              <span style={{fontSize:18,marginTop:2}}>{v.emoji}</span>
              <div>
                <div style={{fontSize:11,fontWeight:700,color:v.color}}>{v.label}</div>
                <div style={{fontSize:10,color:C.sub,lineHeight:1.4,marginTop:2}}>{v.sub}</div>
              </div>
            </div>
          ))}
        </div>
        <div style={{textAlign:"left",marginBottom:18}}>
          <label style={{fontSize:12,fontWeight:700,color:C.sub,display:"block",marginBottom:8,textTransform:"uppercase",letterSpacing:"1px"}}>Как тебя зовут?</label>
          <input autoFocus value={studentName} onChange={e=>setStudentName(e.target.value)}
            onKeyDown={e=>{if(e.key==="Enter"&&studentName.trim())setScreen("quiz");}}
            placeholder="Имя и фамилия..."
            style={{width:"100%",background:C.card,border:`1.5px solid ${studentName.trim()?C.gold:C.border}`,borderRadius:12,padding:"14px 16px",color:C.text,fontSize:16,transition:"border-color .2s"}}/>
        </div>
        <button onClick={()=>{if(studentName.trim())setScreen("quiz");}} disabled={!studentName.trim()}
          style={{width:"100%",background:studentName.trim()?C.gold:C.border,color:studentName.trim()?"#07111d":C.sub,border:"none",borderRadius:12,padding:"15px 0",fontSize:16,fontWeight:700,cursor:studentName.trim()?"pointer":"not-allowed",transition:"all .2s"}}>
          Начать тест →
        </button>
        <ContactBlock/>
      </div>
    </div>
  );

  /* RESULTS */
  if(screen==="results"){
    const res=computeResults();
    const{total,correct,ts}=res;
    const ov=pct(correct,total);
    const lvl=ov>=80?"Отлично 🎉":ov>=60?"Хорошо 👍":ov>=40?"Удовлетворительно":"Нужна серьёзная работа";
    const lvlColor=ov>=80?"#34d399":ov>=60?"#fbbf24":ov>=40?"#fb923c":"#f87171";
    const weak=Object.entries(ts).filter(([,v])=>pct(v.correct,v.total)<60);
    return(
      <div style={{minHeight:"100vh",background:C.bg,padding:"28px 20px"}}>
        <div style={{maxWidth:600,margin:"0 auto"}}>
          <h1 style={{fontFamily:"'Crimson Pro',serif",fontSize:28,fontWeight:600,color:C.gold,textAlign:"center",marginBottom:4}}>Результаты теста</h1>
          <p style={{textAlign:"center",color:C.sub,fontSize:13,marginBottom:18}}>{studentName} · полный кодификатор ЕГЭ</p>
          <div style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:16,padding:"22px",textAlign:"center",marginBottom:12}}>
            <div style={{fontFamily:"'Crimson Pro',serif",fontSize:64,fontWeight:600,color:lvlColor,lineHeight:1}}>{ov}%</div>
            <div style={{fontSize:16,fontWeight:700,color:lvlColor,margin:"6px 0 4px"}}>{lvl}</div>
            <div style={{color:C.sub,fontSize:14}}>{correct} правильных из {total}</div>
          </div>
          <div style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:16,padding:20,marginBottom:12}}>
            <h2 style={{fontFamily:"'Crimson Pro',serif",fontSize:18,fontWeight:600,margin:"0 0 16px",color:C.text}}>По разделам кодификатора</h2>
            {Object.entries(TOPICS).map(([k,v])=>{
              const s=ts[k];const p=pct(s.correct,s.total);
              const bc=p>=80?"#34d399":p>=60?"#fbbf24":p>=40?"#fb923c":"#f87171";
              return(
                <div key={k} style={{marginBottom:15}}>
                  <div style={{display:"flex",justifyContent:"space-between",marginBottom:5}}>
                    <span style={{fontSize:13,fontWeight:600}}>{v.emoji} {v.label}</span>
                    <span style={{fontSize:13,color:bc,fontWeight:700}}>{s.correct}/{s.total} ({p}%)</span>
                  </div>
                  <div style={{background:C.border,borderRadius:4,height:7,overflow:"hidden"}}>
                    <div style={{height:"100%",width:`${p}%`,background:bc,borderRadius:4}}/>
                  </div>
                </div>
              );
            })}
          </div>
          {weak.length>0&&(
            <div style={{background:"rgba(248,113,113,0.08)",border:"1px solid rgba(248,113,113,0.25)",borderRadius:16,padding:18,marginBottom:12}}>
              <h3 style={{margin:"0 0 10px",fontSize:14,fontWeight:700,color:"#f87171"}}>🎯 Приоритеты подготовки (менее 60%)</h3>
              {weak.map(([k,v])=>(
                <div key={k} style={{display:"flex",alignItems:"center",gap:10,background:"rgba(0,0,0,0.2)",borderRadius:8,padding:"8px 12px",marginBottom:7}}>
                  <span style={{fontSize:18}}>{TOPICS[k].emoji}</span>
                  <div style={{flex:1}}>
                    <div style={{fontSize:13,fontWeight:600,color:C.text}}>{TOPICS[k].label}</div>
                    <div style={{fontSize:11,color:C.sub}}>{TOPICS[k].sub}</div>
                  </div>
                  <span style={{color:"#f87171",fontWeight:700,fontSize:13}}>{pct(v.correct,v.total)}%</span>
                </div>
              ))}
            </div>
          )}

          {/* TELEGRAM */}
          <div style={{background:"rgba(38,132,212,0.08)",border:"1px solid rgba(38,132,212,0.3)",borderRadius:16,padding:18,marginBottom:10,textAlign:"center"}}>
            {!sent?(
              <>
                <div style={{fontSize:13,color:C.sub,marginBottom:6,lineHeight:1.7,fontWeight:600,color:C.text}}>
                  Учителю придут два сообщения:
                </div>
                <div style={{fontSize:12,color:C.sub,marginBottom:14,lineHeight:1.7,textAlign:"left",padding:"0 4px"}}>
                  📊 Первое — общий результат и проценты по темам<br/>
                  ✍️ Второе — твои письменные ответы с самооценкой
                </div>
                <button onClick={()=>handleSendTelegram(res)} disabled={sending}
                  style={{width:"100%",background:sending?"#17304a":"#2884d4",color:"#fff",border:"none",borderRadius:12,padding:"14px 0",fontSize:15,fontWeight:700,cursor:sending?"not-allowed":"pointer",transition:"all .2s"}}>
                  {sending?"⏳ Отправляю...":"✈️ Отправить результаты учителю"}
                </button>
              </>
            ):(
              <div style={{fontSize:16,fontWeight:700,color:"#34d399",padding:"10px 0"}}>
                ✅ Результаты отправлены учителю в Telegram!
              </div>
            )}
          </div>
          <button onClick={reset} style={{width:"100%",background:"transparent",border:`1px solid ${C.border}`,borderRadius:12,padding:"13px 0",fontSize:14,fontWeight:600,color:C.sub,cursor:"pointer"}}>
            Пройти тест заново
          </button>
          <ContactBlock/>
        </div>
      </div>
    );
  }

  /* QUIZ */
  const topic=TOPICS[q.tk];
  const progress=(idx/Q.length)*100;
  return(
    <div style={{minHeight:"100vh",background:C.bg,padding:"18px 20px"}}>
      <div style={{maxWidth:600,margin:"0 auto"}}>
        <div style={{marginBottom:16}}>
          <div style={{display:"flex",justifyContent:"space-between",marginBottom:7,alignItems:"center"}}>
            <span style={{fontSize:12,color:C.sub}}>Вопрос {idx+1} из {Q.length} · {studentName}</span>
            <span style={{fontSize:12,fontWeight:700,color:topic.color}}>{topic.emoji} {topic.label}</span>
          </div>
          <div style={{background:C.border,borderRadius:4,height:4}}>
            <div style={{height:"100%",width:`${progress}%`,background:C.gold,borderRadius:4,transition:"width 0.3s"}}/>
          </div>
          <div style={{textAlign:"right",marginTop:4}}>
            <span style={{fontSize:10,color:"#2a4a6a"}}>💾 прогресс сохранён</span>
          </div>
        </div>
        <div style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:16,padding:22,marginBottom:12}}>
          <div style={{marginBottom:12}}>
            <span style={{background:`${topic.color}22`,color:topic.color,fontSize:10,fontWeight:700,padding:"3px 10px",borderRadius:20,letterSpacing:"1.2px",textTransform:"uppercase",display:"inline-block"}}>
              {q.type==="s"?"Один ответ":q.type==="m"?"Несколько ответов":"Письменный ответ"}
            </span>
          </div>
          <p style={{fontFamily:"'Crimson Pro',serif",fontSize:"clamp(16px,2.5vw,20px)",lineHeight:1.55,margin:"0 0 18px",color:C.text}}>{q.q}</p>

          {q.type==="s"&&q.opts.map((opt,i)=>{
            const sel=answers[idx]===i;
            return(
              <div key={i} onClick={()=>{if(answers[idx]===undefined)setAnswers(p=>({...p,[idx]:i}));}}
                style={{padding:"12px 16px",marginBottom:8,borderRadius:10,border:`1px solid ${sel?topic.color:C.border}`,background:sel?`${topic.color}18`:"transparent",cursor:answers[idx]===undefined?"pointer":"default",display:"flex",alignItems:"center",gap:12,transition:"all 0.15s"}}>
                <div style={{width:18,height:18,borderRadius:"50%",flexShrink:0,border:`2px solid ${sel?topic.color:C.sub}`,background:sel?topic.color:"transparent",display:"flex",alignItems:"center",justifyContent:"center"}}>
                  {sel&&<div style={{width:7,height:7,borderRadius:"50%",background:C.bg}}/>}
                </div>
                <span style={{fontSize:14,color:sel?C.text:C.sub,lineHeight:1.4}}>{opt}</span>
              </div>
            );
          })}

          {q.type==="m"&&q.opts.map((opt,i)=>{
            const checked=multiSel.includes(i);
            return(
              <div key={i} onClick={()=>setMultiSel(p=>p.includes(i)?p.filter(x=>x!==i):[...p,i])}
                style={{padding:"12px 16px",marginBottom:8,borderRadius:10,border:`1px solid ${checked?topic.color:C.border}`,background:checked?`${topic.color}18`:"transparent",cursor:"pointer",display:"flex",alignItems:"center",gap:12,transition:"all 0.15s"}}>
                <div style={{width:18,height:18,borderRadius:4,flexShrink:0,border:`2px solid ${checked?topic.color:C.sub}`,background:checked?topic.color:"transparent",display:"flex",alignItems:"center",justifyContent:"center"}}>
                  {checked&&<span style={{color:C.bg,fontSize:11,fontWeight:700,lineHeight:1}}>✓</span>}
                </div>
                <span style={{fontSize:14,color:checked?C.text:C.sub,lineHeight:1.4}}>{opt}</span>
              </div>
            );
          })}

          {q.type==="t"&&(
            <div>
              <textarea value={textVal} onChange={e=>setTextVal(e.target.value)} disabled={showHint} rows={4}
                placeholder="Введи свой ответ здесь..."
                style={{width:"100%",background:"#0a1828",border:`1px solid ${showHint?C.border:C.gold}`,borderRadius:10,padding:"12px 14px",color:C.text,fontSize:14,resize:"vertical",lineHeight:1.6}}/>
              {!showHint&&(
                <button onClick={()=>setShowHint(true)}
                  style={{marginTop:10,background:"transparent",border:`1px solid ${C.gold}`,borderRadius:8,padding:"9px 18px",color:C.gold,fontSize:13,fontWeight:600}}>
                  Показать правильный ответ
                </button>
              )}
              {showHint&&(
                <div style={{marginTop:14}}>
                  <div style={{background:"rgba(221,184,78,0.1)",border:"1px solid rgba(221,184,78,0.3)",borderRadius:10,padding:16,marginBottom:12}}>
                    <div style={{fontSize:10,fontWeight:700,color:C.gold,marginBottom:7,textTransform:"uppercase",letterSpacing:1.2}}>Образцовый ответ</div>
                    <div style={{fontSize:14,lineHeight:1.65,color:C.text}}>{q.hint}</div>
                  </div>
                  <div style={{fontSize:13,fontWeight:600,color:C.sub,marginBottom:9}}>Насколько верен твой ответ?</div>
                  <div style={{display:"flex",gap:10}}>
                    <button onClick={()=>{if(selfMark[idx]===undefined)setSelfMark(p=>({...p,[idx]:true}));}} disabled={selfMark[idx]!==undefined}
                      style={{flex:1,padding:"11px 0",borderRadius:10,background:selfMark[idx]===true?"rgba(52,211,153,0.2)":"rgba(52,211,153,0.1)",border:selfMark[idx]===true?"1px solid #34d399":"1px solid rgba(52,211,153,0.3)",color:"#34d399",fontSize:13,fontWeight:700,cursor:selfMark[idx]!==undefined?"default":"pointer"}}>
                      ✓ Ответил верно
                    </button>
                    <button onClick={()=>{if(selfMark[idx]===undefined)setSelfMark(p=>({...p,[idx]:false}));}} disabled={selfMark[idx]!==undefined}
                      style={{flex:1,padding:"11px 0",borderRadius:10,background:selfMark[idx]===false?"rgba(248,113,113,0.2)":"rgba(248,113,113,0.1)",border:selfMark[idx]===false?"1px solid #f87171":"1px solid rgba(248,113,113,0.3)",color:"#f87171",fontSize:13,fontWeight:700,cursor:selfMark[idx]!==undefined?"default":"pointer"}}>
                      ✗ Ответил неверно
                    </button>
                  </div>
                </div>
              )}
            </div>
          )}
        </div>
        <button onClick={handleNext} disabled={!canNext()}
          style={{width:"100%",padding:14,borderRadius:12,border:"none",background:canNext()?C.gold:C.border,color:canNext()?"#07111d":C.sub,fontSize:15,fontWeight:700,cursor:canNext()?"pointer":"not-allowed",transition:"all 0.2s"}}>
          {idx===Q.length-1?"Завершить тест 🎯":"Следующий вопрос →"}
        </button>
      </div>
    </div>
  );
}

const root=ReactDOM.createRoot(document.getElementById("root"));
root.render(<EGETest/>);
</script>
</body>
</html>
